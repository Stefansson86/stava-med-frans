<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stava med Frans - Meny</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
        }

        .menu-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 300px;
            padding: 20px;
            font-size: 1.5em;
            font-weight: 800;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            font-family: 'Nunito', Arial, sans-serif;
        }

        .menu-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .menu-button.spell-game {
            color: #71b87a;
            border: 3px solid #71b87a;
        }

        .menu-button.match-game {
            color: #8bb3e1;
            border: 3px solid #8bb3e1;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <h1>Stava med Frans</h1>

        <div class="menu-container">
            <a href="spelling.html" class="menu-button spell-game">✏️ Spela Stava</a>
            <a href="match.html" class="menu-button match-game">🔍 Spela Gissa</a>
        </div>
    </div>
</body>

</html>
